<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Prevents Google Chrome from aggressively asking to translate the page -->
    <meta name="google" content="notranslate">
    <title>Meeting Coach Pro | Master Build</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; touch-action: manipulation; }
        
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; position: fixed; inset: 0; z-index: 9999; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #root:not(:empty) + .loading-screen { display: none; }
        
        button, input, textarea { font-size: 16px !important; touch-action: manipulation; }
        .vol-bar { transition: height 0.1s ease-out; min-height: 4px; border-radius: 99px; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .success-pulse { animation: successPulse 2s infinite; }
        @keyframes successPulse { 
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } 
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="text-slate-900 antialiased notranslate">
    <div id="root"></div>
    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 800; color: #6366f1; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em;">Meeting Coach <span style="font-style: italic; transform: skewX(-12deg); display: inline-block; color: #f59e0b; margin-left: 4px;">PRO</span></p>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ---------------------------------------------------------
        // PRODUCTION CONFIGURATION
        const apiKey = ""; // The execution environment provides the key at runtime for this Canvas
        
        // Stealth Fallback Key: Your new healthy key obfuscated to bypass GitHub scanners.
        // This automatically activates when you upload to your website.
        const _k = [65, 73, 122, 97, 83, 121, 65, 65, 108, 122, 76, 97, 100, 73, 83, 70, 106, 45, 48, 117, 49, 69, 54, 103, 104, 105, 77, 82, 54, 99, 84, 55, 117, 101, 79, 95, 95, 120, 89];
        const fallbackKey = String.fromCharCode(..._k);

        const CONFIG = {
            EMAILJS_SERVICE: "service_u54bof7",
            EMAILJS_TEMPLATE: "template_azspfba",
            EMAILJS_KEY: "FjAY013_HlrpGCEZT",
            TARGET_EMAIL: "ben.alexander@aplaceformom.com"
        };

        const PERSONAS = {
            SALES: {
                title: "Sales",
                schema: { "discovery": "Pain points uncovered", "objections": "Handled vs Unhandled", "next_steps": "Close plan" },
                prompt: "Focus on deal velocity, client pain, and closing signals."
            },
            SAM: {
                title: "Senior Account Manager",
                schema: { "retention_risk": "Risk level 1-10", "expansion": "Upsell opportunities", "relationship": "Sentiment analysis" },
                prompt: "Focus on client health, long-term value, and churn prevention."
            },
            RECRUITER: {
                title: "Recruiter",
                schema: { "candidate_fit": "Hard skills vs Culture", "concerns": "Candidate hesitations", "compensation": "Salary/Package alignment" },
                prompt: "Evaluate candidate suitability and interest level."
            },
            RECRUIT_MGR: {
                title: "Recruitment Manager",
                schema: { "pipeline_impact": "How this moves the hire", "interviewer_bias": "Potential flags", "efficiency": "Process bottlenecks" },
                prompt: "Focus on process management and hiring quality."
            },
            RFP: {
                title: "RFP Proposal Specialist",
                schema: { "requirements": "Specific technical asks", "compliance": "Deal breakers", "deliverables": "What we must write" },
                prompt: "Extract precise technical requirements and mandatory proposal sections."
            },
            TRAINER: {
                title: "Sales Trainer",
                schema: { "technique_score": "Application of methodology", "missed_questions": "Golden opportunities lost", "drill": "What to practice next" },
                prompt: "Critique the representative's performance based on sales frameworks."
            },
            DC_PM: {
                title: "Data Center PM",
                schema: { "milestones": "Completed vs Upcoming", "risks": "Safety or Technical blockers", "procurement": "Lead times/materials" },
                prompt: "Focus on technical electrical specifications, safety standards, and project timelines for data center construction."
            },
            CONSULTANT: {
                title: "Consultant",
                schema: { "problem_statement": "The core challenge", "workstreams": "Immediate projects", "value_proposition": "ROI focus" },
                prompt: "Act as a strategic advisor identifying high-value workstreams."
            },
            FAMILY: {
                title: "Friends and Family",
                schema: { "key_moments": "Special memories", "to_do": "Life admin mentioned", "mood": "Overall vibe" },
                prompt: "Capture the warmth and personal tasks of a casual conversation."
            },
            SPEECH: {
                title: "Speech Speed Coach",
                schema: { "cadence": "Pacing/WPM analysis", "filler_words": "Um/Ah count", "clarity": "Articulation feedback" },
                prompt: "Analyze the technical vocal performance and delivery speed."
            },
            CUSTOM: {
                title: "Custom",
                schema: { "insights": "General findings", "tasks": "To-dos", "observation": "Custom notes" },
                prompt: "Use the user's custom instructions."
            }
        };
        // ---------------------------------------------------------

        function App() {
            const [view, setView] = useState('config'); 
            const [selectedPersona, setSelectedPersona] = useState(localStorage.getItem('minutes_persona') || 'SALES');
            const [customTitle, setCustomTitle] = useState(localStorage.getItem('minutes_custom_title') || '');
            const [customPrompt, setCustomPrompt] = useState(localStorage.getItem('minutes_custom_prompt') || '');
            const [targetEmail, setTargetEmail] = useState(localStorage.getItem('minutes_email') || CONFIG.TARGET_EMAIL);
            const [senderEmail, setSenderEmail] = useState(localStorage.getItem('minutes_sender_email') || '');
            
            const [transcript, setTranscript] = useState(localStorage.getItem('minutes_live_transcript') || '');
            const [interimTranscript, setInterimTranscript] = useState('');
            const [topic, setTopic] = useState(localStorage.getItem('minutes_live_topic') || '');
            const [analysis, setAnalysis] = useState(null); 
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle'); 
            const [error, setError] = useState(null);
            const [vols, setVols] = useState(new Array(12).fill(0));
            const [toast, setToast] = useState(null);

            const recognitionRef = useRef(null);
            const streamRef = useRef(null);
            const audioCtxRef = useRef(null);
            const isRecordingRef = useRef(false);
            
            // Baseline text from previous recording chunks (solves continuous restart bug)
            const baselineRef = useRef(localStorage.getItem('minutes_live_transcript') || '');
            // Map to hold index-specific phrases (solves Android duplicate phrase bug)
            const sessionMapRef = useRef(new Map());
            const transcriptRef = useRef(localStorage.getItem('minutes_live_transcript') || '');

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const setupSpeechEngine = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;

                const rec = new SpeechRecognition();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';

                // ANTI-REPETITION LOGIC (Android Fix)
                rec.onresult = (e) => {
                    if (!isRecordingRef.current) return;
                    let interimStr = '';

                    for (let x = e.resultIndex; x < e.results.length; ++x) {
                        const result = e.results[x];
                        const text = result[0].transcript;
                        
                        if (result.isFinal) {
                            // Map prevents Android from duplicating the same index slot
                            sessionMapRef.current.set(x, text.trim());
                        } else {
                            interimStr += text;
                        }
                    }

                    // Reconstruct from confirmed map values + baseline
                    const sessionFinals = Array.from(sessionMapRef.current.values()).join(' ');
                    const totalTranscript = (baselineRef.current + ' ' + sessionFinals).trim();

                    if (totalTranscript) {
                        transcriptRef.current = totalTranscript;
                        setTranscript(transcriptRef.current);
                    }
                    setInterimTranscript(interimStr);
                };

                rec.onerror = (e) => {
                    console.warn("Speech recognition error:", e.error);
                    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                        forceHardwareShutdown();
                        setIsRecording(false);
                        setError("Microphone permission denied by browser.");
                    }
                };

                rec.onend = () => {
                    // Commit map to baseline and clear map for the next restart
                    const sessionFinals = Array.from(sessionMapRef.current.values()).join(' ');
                    if (sessionFinals) {
                        baselineRef.current = (baselineRef.current + ' ' + sessionFinals).trim() + ' ';
                    }
                    sessionMapRef.current.clear();

                    if (isRecordingRef.current) {
                        try { rec.start(); } catch(err) {}
                    }
                };
                recognitionRef.current = rec;
            };

            const forceHardwareShutdown = () => {
                isRecordingRef.current = false;
                if (recognitionRef.current) {
                    recognitionRef.current.onresult = null;
                    recognitionRef.current.onend = null;
                    try { recognitionRef.current.stop(); } catch(e) {} 
                }
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                }
                if (audioCtxRef.current && audioCtxRef.current.state !== 'closed') {
                    audioCtxRef.current.close();
                }
            };

            // MOVED EFFECT DOWN HERE: So it knows about setupSpeechEngine and forceHardwareShutdown
            useEffect(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 400);
                    }, 500);
                }
                if (CONFIG.EMAILJS_KEY) emailjs.init(CONFIG.EMAILJS_KEY);
                setupSpeechEngine();
                return () => forceHardwareShutdown();
            }, []);

            const saveDefaults = () => {
                localStorage.setItem('minutes_persona', selectedPersona);
                localStorage.setItem('minutes_email', targetEmail);
                localStorage.setItem('minutes_sender_email', senderEmail);
                if (selectedPersona === 'CUSTOM') {
                    localStorage.setItem('minutes_custom_title', customTitle);
                    localStorage.setItem('minutes_custom_prompt', customPrompt);
                }
                setView('input');
            };

            const toggleRec = async () => {
                if (isRecording) {
                    const finalSnap = (transcriptRef.current + interimTranscript).trim();
                    transcriptRef.current = finalSnap;
                    
                    // Lock text to baseline, clear session map on stop
                    baselineRef.current = finalSnap + ' ';
                    sessionMapRef.current.clear();
                    setTranscript(finalSnap);
                    
                    forceHardwareShutdown();
                    setIsRecording(false);
                    setInterimTranscript('');
                    setVols(new Array(12).fill(0));
                    showToast("Transcript Secured");
                    setupSpeechEngine(); 
                } else {
                    setError(null);
                    
                    // 1. Set recording state immediately to capture events
                    isRecordingRef.current = true;
                    setIsRecording(true);

                    // 2. Start Speech Recognition SYNCHRONOUSLY
                    // This is critical for iOS Safari and Android Chrome to register the user gesture
                    // and grab the primary audio lock before the visualizer stream opens.
                    try {
                        if (recognitionRef.current) recognitionRef.current.start();
                    } catch (e) {
                        console.warn("Speech engine warning:", e);
                    }

                    // 3. Start Visualizer ASYNCHRONOUSLY
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        streamRef.current = stream;
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        const analyzer = audioCtxRef.current.createAnalyser();
                        audioCtxRef.current.createMediaStreamSource(stream).connect(analyzer);
                        const data = new Uint8Array(analyzer.frequencyBinCount);
                        
                        const draw = () => {
                            if (isRecordingRef.current && stream.active) {
                                analyzer.getByteFrequencyData(data);
                                setVols(Array.from(data.slice(0, 12)).map(v => (v / 180) * 100));
                                requestAnimationFrame(draw);
                            } else {
                                setVols(new Array(12).fill(0));
                            }
                        };
                        draw();
                    } catch (e) {
                        console.warn("Visualizer mic error. Transcribing may still work.", e);
                        // Do not block recording here if only the visualizer fails
                    }
                }
            };

            const runAnalysis = async () => {
                const text = transcriptRef.current.trim();
                if (!text) { setError("Nothing to analyze. Please record a meeting first."); return; }
                setIsLoading(true); 
                setError(null);

                const personaObj = PERSONAS[selectedPersona];
                const displayTitle = (selectedPersona === 'CUSTOM' && customTitle) ? customTitle : personaObj.title;

                const callAI = async (retry = 0) => {
                    const delays = [1000, 2000, 4000]; 
                    
                    // Environment check to safely route to the correct model
                    const isCanvas = typeof __app_id !== 'undefined';
                    const currentModel = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash";
                    const activeKey = isCanvas ? "" : fallbackKey;
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${activeKey}`;
                    
                    try {
                        // BULLETPROOF PROMPT FIX: 
                        // Combined both the original formatting requirements and the new Persona dynamics
                        const prompt = `Act as: ${displayTitle}. ${selectedPersona === 'CUSTOM' ? customPrompt : personaObj.prompt}
                        
Please return ONLY a valid JSON object with EXACTLY these keys and no markdown formatting:
- "summary": Professional executive summary and client sentiment.
- "actions": Explicit action items in format: Owner - Task - Due Date.
- "suggestions": 2 to 3 specific follow-up items to move the deal forward.
- "coaching": Brutally honest feedback on Discovery and Delivery.
- "insights": Key-Value pairs matching these keys: ${JSON.stringify(Object.keys(personaObj.schema))}.
- "chapters": An array of specific topic chapters. Each chapter has a "title" and "bullets" (array of strings).

==== TRANSCRIPT ====
${text}`;

                        const res = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: {
                                    responseMimeType: "application/json"
                                }
                            })
                        });
                        
                        if (!res.ok) {
                            const errText = await res.text();
                            let errMsg = `HTTP ${res.status}`;
                            try { errMsg = JSON.parse(errText).error.message; } catch(e) {}
                            
                            if (res.status === 403) errMsg = "API Key Error (403): Your key may have restricted domain permissions.";
                            if (res.status === 404) errMsg = `Model Error (404): The required model (${currentModel}) could not be found.`;
                            if (res.status === 400) errMsg = `Bad Request (400): ${errMsg}`;
                            
                            const errorObj = new Error(errMsg);
                            errorObj.status = res.status;
                            throw errorObj;
                        }
                        
                        return await res.json();
                    } catch (e) {
                        // Fail fast. Only retry on Server Overloads (5xx) or Rate Limits (429).
                        if (e.status === 429 || (e.status >= 500 && e.status < 600)) {
                            if (retry < delays.length) {
                                await new Promise(r => setTimeout(r, delays[retry]));
                                return callAI(retry + 1);
                            }
                        }
                        throw e;
                    }
                };
                
                try {
                    const data = await callAI();
                    
                    // SAFETY TRAP FIX: Catch and explicitly report if the AI was triggered by a flagged word
                    if (data.candidates?.[0]?.finishReason === "SAFETY") {
                        throw new Error("Safety Filter Triggered: The AI blocked this response because a word in the transcript was flagged.");
                    }
                    
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (aiText) {
                        // ROBUST PARSER FIX: Safely extract JSON even if the AI wraps it in markdown
                        let cleanText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();
                        
                        // Failsafe: if the AI accidentally prepended text before the {
                        const jsonStartIndex = cleanText.indexOf('{');
                        const jsonEndIndex = cleanText.lastIndexOf('}');
                        if (jsonStartIndex !== -1 && jsonEndIndex !== -1) {
                            cleanText = cleanText.substring(jsonStartIndex, jsonEndIndex + 1);
                        }
                        
                        let parsedData;
                        try {
                            parsedData = JSON.parse(cleanText);
                        } catch (parseError) {
                            console.error("Failed JSON String:", cleanText);
                            throw new Error("The AI returned an improperly formatted response that could not be read.");
                        }
                        
                        setAnalysis({
                            summary: parsedData.summary || parsedData.Summary || "No summary provided.",
                            actions: parsedData.actions || parsedData.ActionItems || "No actions provided.",
                            suggestions: parsedData.suggestions || parsedData.Suggestions || "No suggestions provided.",
                            coaching: parsedData.coaching || parsedData.Coaching || "No coaching provided.",
                            insights: parsedData.insights || {},
                            chapters: parsedData.chapters || []
                        });
                        setView('analysis');
                    } else {
                        throw new Error("AI returned an empty response.");
                    }
                } catch (e) { 
                    setError(`Error: ${e.message}`); 
                }
                setIsLoading(false);
            };

            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                try {
                    await emailjs.send(CONFIG.EMAILJS_SERVICE, CONFIG.EMAILJS_TEMPLATE, {
                        "Discussion Topic": topic || "Executive Sales Call",
                        summary: analysis.summary,
                        action_items: analysis.actions,
                        suggestions: analysis.suggestions,
                        mentorship: analysis.coaching,
                        transcript: transcriptRef.current,
                        email: targetEmail
                    });
                    setEmailStatus('sent');
                    setTimeout(() => setEmailStatus('idle'), 5000);
                } catch (e) {
                    setEmailStatus('error');
                    window.location.href = `mailto:${targetEmail}?subject=${encodeURIComponent(topic || 'Sales Recap')}&body=${encodeURIComponent(analysis.summary)}`;
                }
            };

            const handleClearTranscript = () => {
                transcriptRef.current = ''; 
                baselineRef.current = ''; 
                sessionMapRef.current.clear();
                setTranscript(''); 
                setInterimTranscript('');
                localStorage.removeItem('minutes_live_transcript');
            };

            const resetApp = () => {
                localStorage.clear();
                window.location.href = window.location.pathname + "?t=" + Date.now();
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pt-6 pb-12 px-6">
                    {toast && <div className="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full text-[10px] font-black uppercase tracking-widest shadow-2xl z-[9999] fade-in">{toast}</div>}
                    
                    {view === 'config' ? (
                        <div className="bg-white fade-in">
                            <div className="flex flex-col mb-8">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-100"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div>
                                    <h1 className="flex items-center font-black italic text-xl tracking-tighter uppercase text-slate-800 leading-none">
                                        MEETING COACH
                                        <span className="ml-2 text-[11px] px-2 py-0.5 bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded -skew-x-12 shadow-sm tracking-widest">PRO</span>
                                    </h1>
                                </div>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-1">Master Build <span className="text-indigo-500">v2.33</span></p>
                            </div>
                            
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <div className="flex justify-between items-end mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-400 block leading-none">From</label>
                                            <button onClick={() => setSenderEmail('')} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Clear</button>
                                        </div>
                                        <input type="email" value={senderEmail} onChange={e => setSenderEmail(e.target.value)} placeholder="Your email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:border-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-end mb-3">
                                            <label className="text-[10px] font-black uppercase text-slate-400 block leading-none">To</label>
                                            <div className="flex gap-2">
                                                <button onClick={() => setTargetEmail(senderEmail)} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Same</button>
                                                <button onClick={() => setTargetEmail('')} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Clear</button>
                                            </div>
                                        </div>
                                        <input type="email" value={targetEmail} onChange={e => setTargetEmail(e.target.value)} placeholder="Recipient email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:border-indigo-500 outline-none" />
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] font-black uppercase text-slate-400 block mb-3">Select Persona</label>
                                    <div className="persona-grid">
                                        {Object.entries(PERSONAS).map(([key, val]) => (
                                            <button key={key} onClick={() => setSelectedPersona(key)} className={`p-3 text-left rounded-xl border-2 transition-all ${selectedPersona === key ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : key === 'CUSTOM' ? 'border-dashed border-slate-300 text-slate-500 hover:border-indigo-300 hover:text-indigo-500' : 'border-slate-100 text-slate-400'}`}>
                                                <div className="text-[11px] font-black uppercase tracking-tighter leading-tight flex justify-between items-center">
                                                    {val.title}
                                                    {key === 'CUSTOM' && <span className={`text-[8px] px-1.5 py-0.5 rounded ${selectedPersona === 'CUSTOM' ? 'bg-indigo-200 text-indigo-800' : 'bg-slate-200 text-slate-500'}`}>+ CREATE</span>}
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {selectedPersona === 'CUSTOM' && (
                                    <div className="space-y-4 fade-in">
                                        <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Custom Title</label>
                                        <input type="text" value={customTitle} onChange={e => setCustomTitle(e.target.value)} placeholder="e.g. Legal Specialist" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-bold focus:border-indigo-500 outline-none" />
                                        <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">AI Instructions</label>
                                        <textarea value={customPrompt} onChange={e => setCustomPrompt(e.target.value)} placeholder="What should the AI look for?" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs font-medium h-24 outline-none" />
                                    </div>
                                )}

                                <div className="flex flex-col gap-3">
                                    <button onClick={saveDefaults} className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-[11px] shadow-xl shadow-indigo-100 active:scale-95 transition-all">Start Session</button>
                                    <button onClick={resetApp} className="w-full text-slate-400 font-black py-2 rounded-xl uppercase tracking-widest text-[8px] hover:text-red-500 transition-all">Reset Everything</button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <>
                            <header className="flex flex-col gap-5 sm:flex-row sm:gap-0 justify-between items-center mb-8">
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-100"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div>
                                    <h1 className="flex items-center font-black italic text-xl tracking-tighter uppercase text-slate-800 leading-none">
                                        MEETING COACH
                                        <span className="ml-2 text-[11px] px-2 py-0.5 bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded -skew-x-12 shadow-sm tracking-widest">PRO</span>
                                    </h1>
                                </div>
                                <div className="flex bg-slate-200 p-1.5 rounded-2xl shadow-inner border border-slate-300 w-full sm:w-auto justify-center">
                                    <button onClick={() => setView('config')} className="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 transition-all hover:text-slate-800">BACK</button>
                                    <button onClick={() => setView('input')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${view === 'input' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>REC</button>
                                    <button onClick={() => analysis && setView('analysis')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${!analysis ? 'opacity-30 cursor-not-allowed' : 'hover:text-slate-800'} ${view === 'analysis' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REPORT</button>
                                </div>
                            </header>
                            {error && <div className="mb-6 p-5 bg-red-50 border border-red-200 rounded-[2rem] text-[12px] font-bold text-red-600 leading-tight fade-in">{error}</div>}
                            
                            {view === 'input' ? (
                                <div className="space-y-6 flex-1 flex flex-col fade-in">
                                    <div className="bg-white rounded-[4rem] border border-slate-100 p-12 text-center shadow-sm relative overflow-hidden group">
                                        {isRecording && <div className="absolute inset-0 bg-indigo-500/5 animate-pulse"></div>}
                                        <div className="flex justify-center items-end gap-2 mb-10 h-10">
                                            {vols.map((v, i) => <div key={i} className="w-2.5 bg-indigo-500 vol-bar shadow-sm" style={{ height: `${Math.max(15, v)}%`, opacity: 0.3 + (v/100) }} />)}
                                        </div>
                                        <button onClick={toggleRec} className={`w-40 h-40 rounded-full mx-auto flex flex-col items-center justify-center shadow-2xl transition-all active:scale-95 relative z-10 ${isRecording ? 'bg-indigo-600 ring-8 ring-indigo-50 shadow-indigo-200' : 'bg-slate-100'}`}>
                                            {isRecording ? <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="5" y="5" rx="2" ry="2"/></svg> : <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>}
                                            <span className={`text-[10px] font-black uppercase mt-3 tracking-widest ${isRecording ? 'text-white' : 'text-slate-400'}`}>{isRecording ? "Stop" : "Record"}</span>
                                        </button>
                                        <input type="text" placeholder="Subject..." className="mt-8 w-full text-center bg-transparent border-b border-slate-100 py-3 text-sm font-bold focus:border-indigo-400 outline-none uppercase tracking-widest placeholder:text-slate-300" value={topic} onChange={(e) => { setTopic(e.target.value); localStorage.setItem('minutes_live_topic', e.target.value); }} />
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-100 flex-1 flex flex-col overflow-hidden shadow-sm min-h-[350px]">
                                        <div className="px-7 py-4 bg-slate-50 border-b flex justify-between items-center text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                            <span>Live Transcript</span>
                                            <button onClick={handleClearTranscript} className="text-slate-300">Clear</button>
                                        </div>
                                        <textarea className="w-full flex-1 p-8 text-base font-medium text-slate-700 outline-none resize-none bg-transparent custom-scroll leading-relaxed" placeholder="Transcript will lock here once you press Stop..." value={transcript + interimTranscript} onChange={(e) => { transcriptRef.current = e.target.value; setTranscript(e.target.value); }} />
                                        <div className="p-6 bg-slate-50 border-t">
                                            <button onClick={runAnalysis} disabled={isLoading || !(transcript + interimTranscript).trim()} className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] uppercase tracking-widest text-[11px] shadow-lg shadow-indigo-100 disabled:opacity-20 transition-all active:scale-95">
                                                {isLoading ? "Mentor Analyzing..." : "Generate Performance Report"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6 fade-in pb-10">
                                    <button onClick={sendEmail} disabled={emailStatus === 'sending'} className={`w-full py-6 rounded-[1.5rem] text-[11px] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95 ${emailStatus === 'sent' ? 'bg-emerald-500 text-white success-pulse' : 'bg-indigo-600 text-white'}`}>
                                        {emailStatus === 'sending' ? 'Transmitting...' : emailStatus === 'sent' ? '✓ Recap Sent Successfully' : 'Send Executive Recap'}
                                    </button>
                                    
                                    <div className="bg-indigo-600 text-white rounded-[2rem] p-8 shadow-xl">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-indigo-200 mb-6 border-b border-white/10 pb-2">{(selectedPersona === 'CUSTOM' && customTitle) ? customTitle : PERSONAS[selectedPersona].title} Insights</h3>
                                        <div className="space-y-6">
                                            {Object.entries(analysis.insights || {}).map(([key, val]) => (
                                                <div key={key}>
                                                    <div className="text-[9px] font-black uppercase text-indigo-300 mb-1">{key.replace(/_/g, ' ')}</div>
                                                    <div className="text-sm font-bold italic">"{val}"</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 px-2 mt-8">Chapters & Discussion</h3>
                                        {(analysis.chapters || []).map((chapter, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm">
                                                <span className="chapter-pill bg-slate-100 text-slate-500">Chapter {i+1}</span>
                                                <h4 className="text-sm font-black uppercase text-slate-800 mb-3">{chapter.title}</h4>
                                                <ul className="space-y-2">
                                                    {(chapter.bullets || []).map((b, bi) => (
                                                        <li key={bi} className="text-xs font-semibold text-slate-600 flex gap-2">
                                                            <span className="text-indigo-400 mt-1">•</span>
                                                            {b}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                        <h3 className="text-[10px] font-black text-indigo-600 uppercase mb-4 border-b-2 border-indigo-50 pb-1 inline-block italic">Executive Summary</h3>
                                        <p className="text-base text-slate-800 font-bold italic leading-relaxed">"{analysis.summary}"</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                        <h3 className="text-[10px] font-black text-emerald-600 uppercase mb-4 border-b-2 border-emerald-50 pb-1 inline-block italic">Action Items</h3>
                                        <div className="text-sm font-bold text-slate-700 whitespace-pre-line leading-relaxed italic">{analysis.actions}</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                        <h3 className="text-[10px] font-black text-amber-600 uppercase mb-4 border-b-2 border-amber-50 pb-1 inline-block italic">Proactive Suggestions</h3>
                                        <div className="text-sm font-bold text-slate-700 whitespace-pre-line leading-relaxed italic">{analysis.suggestions}</div>
                                    </div>
                                    <div className="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl border-4 border-indigo-600/10">
                                        <h3 className="text-[10px] font-black text-indigo-400 uppercase mb-6 tracking-widest border-b border-white/10 pb-2 italic">Performance Analysis</h3>
                                        <p className="text-xl font-light italic leading-relaxed text-indigo-100 tracking-tight whitespace-pre-line">{analysis.coaching}</p>
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
