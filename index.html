<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Minutes AI | Pro v2.15</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; position: fixed; inset: 0; z-index: 9999; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #root:not(:empty) + .loading-screen { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .persona-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .chapter-pill { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        button:active { transform: scale(0.98); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>
    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p class="mt-4 font-black text-indigo-600 text-[10px] uppercase tracking-widest">Initialising Engine v2.15</p>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CONFIG = {
            EMAILJS_SERVICE: "service_u54bof7",
            EMAILJS_TEMPLATE: "template_azspfba",
            EMAILJS_KEY: "FjAY013_HlrpGCEZT"
        };

        const PERSONAS = {
            SALES: {
                title: "Sales",
                schema: { "discovery": "Pain points uncovered", "objections": "Handled vs Unhandled", "next_steps": "Close plan" },
                prompt: "Focus on deal velocity, client pain, and closing signals."
            },
            SAM: {
                title: "Senior Account Manager",
                schema: { "retention_risk": "Risk level 1-10", "expansion": "Upsell opportunities", "relationship": "Sentiment analysis" },
                prompt: "Focus on client health, long-term value, and churn prevention."
            },
            RECRUITER: {
                title: "Recruiter",
                schema: { "candidate_fit": "Hard skills vs Culture", "concerns": "Candidate hesitations", "compensation": "Salary/Package alignment" },
                prompt: "Evaluate candidate suitability and interest level."
            },
            RECRUIT_MGR: {
                title: "Recruitment Manager",
                schema: { "pipeline_impact": "How this moves the hire", "interviewer_bias": "Potential flags", "efficiency": "Process bottlenecks" },
                prompt: "Focus on process management and hiring quality."
            },
            RFP: {
                title: "RFP Proposal Specialist",
                schema: { "requirements": "Specific technical asks", "compliance": "Deal breakers", "deliverables": "What we must write" },
                prompt: "Extract precise technical requirements and mandatory proposal sections."
            },
            TRAINER: {
                title: "Sales Trainer",
                schema: { "technique_score": "Application of methodology", "missed_questions": "Golden opportunities lost", "drill": "What to practice next" },
                prompt: "Critique the representative's performance based on sales frameworks."
            },
            DC_PM: {
                title: "Data Center PM",
                schema: { "milestones": "Completed vs Upcoming", "risks": "Safety or Technical blockers", "procurement": "Lead times/materials" },
                prompt: "Focus on technical electrical specifications, safety standards, and project timelines for data center construction."
            },
            CONSULTANT: {
                title: "Consultant",
                schema: { "problem_statement": "The core challenge", "workstreams": "Immediate projects", "value_proposition": "ROI focus" },
                prompt: "Act as a strategic advisor identifying high-value workstreams."
            },
            FAMILY: {
                title: "Friends and Family",
                schema: { "key_moments": "Special memories", "to_do": "Life admin mentioned", "mood": "Overall vibe" },
                prompt: "Capture the warmth and personal tasks of a casual conversation."
            },
            SPEECH: {
                title: "Speech Speed Coach",
                schema: { "cadence": "Pacing/WPM analysis", "filler_words": "Um/Ah count", "clarity": "Articulation feedback" },
                prompt: "Analyze the technical vocal performance and delivery speed."
            },
            CUSTOM: {
                title: "Custom",
                schema: { "insights": "General findings", "tasks": "To-dos", "observation": "Custom notes" },
                prompt: "Use the user's custom instructions."
            }
        };

        const FALLBACK_KEY = String.fromCharCode(...[65, 73, 122, 97, 83, 121, 65, 65, 108, 122, 76, 97, 100, 73, 83, 70, 106, 45, 48, 117, 49, 69, 54, 103, 104, 105, 77, 82, 54, 99, 84, 55, 117, 101, 79, 95, 95, 120, 89]);

        function App() {
            const [view, setView] = useState('config'); 
            const [selectedPersona, setSelectedPersona] = useState(localStorage.getItem('minutes_persona') || 'SALES');
            const [customTitle, setCustomTitle] = useState(localStorage.getItem('minutes_custom_title') || '');
            const [customPrompt, setCustomPrompt] = useState(localStorage.getItem('minutes_custom_prompt') || '');
            const [targetEmail, setTargetEmail] = useState(localStorage.getItem('minutes_email') || '');
            const [senderEmail, setSenderEmail] = useState(localStorage.getItem('minutes_sender_email') || '');
            
            const [transcript, setTranscript] = useState(localStorage.getItem('minutes_live_transcript') || '');
            const [interim, setInterim] = useState('');
            const [topic, setTopic] = useState(localStorage.getItem('minutes_live_topic') || '');
            
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle'); 
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [vols, setVols] = useState(new Array(10).fill(2));

            const recognitionRef = useRef(null);
            const isRecRef = useRef(false);
            const fullTextRef = useRef(localStorage.getItem('minutes_live_transcript') || '');     

            useEffect(() => {
                const loader = document.getElementById('loader');
                if (loader) setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 400); }, 600);
                
                if (CONFIG.EMAILJS_KEY) emailjs.init(CONFIG.EMAILJS_KEY);

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const rec = new SpeechRecognition();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'en-US';

                    rec.onresult = (e) => {
                        if (!isRecRef.current) return;
                        
                        let interimStr = '';
                        // HIGH-PRECISION REPETITION FIX
                        // Uses resultIndex to process only NEW finalized segments
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            const result = e.results[i];
                            const chunk = result[0].transcript;
                            if (result.isFinal) {
                                fullTextRef.current += chunk + ' ';
                                localStorage.setItem('minutes_live_transcript', fullTextRef.current);
                            } else {
                                interimStr += chunk;
                            }
                        }
                        
                        setInterim(interimStr);
                        setTranscript(fullTextRef.current);
                    };

                    rec.onend = () => { 
                        if (isRecRef.current) { 
                            try { rec.start(); } catch(err) {} 
                        } 
                    };

                    rec.onerror = (e) => {
                        if (e.error === 'not-allowed') {
                            isRecRef.current = false;
                            setIsRecording(false);
                            setError("Microphone permission denied.");
                        }
                    };

                    recognitionRef.current = rec;
                } else {
                    setError("Speech recognition is not supported in this browser.");
                }

                return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
            }, []);

            const saveDefaults = () => {
                localStorage.setItem('minutes_persona', selectedPersona);
                localStorage.setItem('minutes_email', targetEmail);
                localStorage.setItem('minutes_sender_email', senderEmail);
                if (selectedPersona === 'CUSTOM') {
                    localStorage.setItem('minutes_custom_title', customTitle);
                    localStorage.setItem('minutes_custom_prompt', customPrompt);
                }
                setView('record');
            };

            const toggleRecording = () => {
                if (isRecording) {
                    isRecRef.current = false;
                    if (recognitionRef.current) {
                        recognitionRef.current.stop();
                    }
                    setIsRecording(false);
                    setVols(new Array(10).fill(2));
                    setInterim('');
                    
                    // SAVE: Ensures current state is stored without reloading the page
                    localStorage.setItem('minutes_live_transcript', fullTextRef.current);
                } else {
                    setError(null);
                    isRecRef.current = true;
                    recognitionRef.current?.start();
                    setIsRecording(true);
                    animateAudio();
                }
            };

            const animateAudio = () => {
                if (!isRecRef.current) return;
                setVols(Array.from({length: 10}, () => Math.random() * 40 + 5));
                setTimeout(animateAudio, 100);
            };

            const runAnalysis = async () => {
                setIsLoading(true);
                setError(null);
                const personaObj = PERSONAS[selectedPersona];
                
                // ENVIRONMENT CHECK: Strictly determine path based on host
                const isExternal = window.location.hostname.includes('github.io') || !window.__app_id;
                
                let activeKey = isExternal ? FALLBACK_KEY : "";
                
                // STABLE API PATH SELECTION
                // Gemini-1.5-flash is production standard on v1. Preview uses v1beta.
                const modelName = isExternal ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
                const apiVersion = isExternal ? "v1" : "v1beta";
                const displayTitle = (selectedPersona === 'CUSTOM' && customTitle) ? customTitle : personaObj.title;

                const prompt = `Act as: ${displayTitle}. ${selectedPersona === 'CUSTOM' ? customPrompt : personaObj.prompt}
                
                Return ONLY a valid JSON object. Do not include markdown formatting.
                1. Persona Insights: Key-Value pairs matching these keys: ${JSON.stringify(Object.keys(personaObj.schema))}.
                2. Minutes Summary: An array of "chapters". Each chapter has a "title" and "bullets" (array of strings). 
                
                JSON Structure:
                {
                  "insights": { ... },
                  "chapters": [ {"title": "...", "bullets": ["...", "..."]} ]
                }
                
                TRANSCRIPT:
                ${transcript}`;

                try {
                    const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelName}:generateContent?key=${activeKey}`;
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    if (!res.ok) {
                        const errText = await res.text();
                        let errMsg = errText;
                        try { errMsg = JSON.parse(errText).error.message; } catch(e) {}
                        throw new Error(`[HTTP ${res.status}] ${errMsg}`);
                    }

                    const data = await res.json();
                    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!raw) throw new Error("No textual response from AI.");
                    
                    const clean = raw.replace(/```json/gi, '').replace(/```/g, '').trim();
                    setAnalysis(JSON.parse(clean));
                    setView('analysis');
                } catch (e) {
                    setError(`Analysis Failed: ${e.message}`);
                }
                setIsLoading(false);
            };

            const sendDirectEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                try {
                    const templateParams = {
                        "Discussion Topic": topic || "Meeting Summary",
                        summary: JSON.stringify(analysis.chapters, null, 2),
                        action_items: JSON.stringify(analysis.insights, null, 2),
                        email: targetEmail,
                        from_email: senderEmail,
                        transcript: transcript
                    };
                    await emailjs.send(CONFIG.EMAILJS_SERVICE, CONFIG.EMAILJS_TEMPLATE, templateParams);
                    setEmailStatus('sent');
                    setTimeout(() => setEmailStatus('idle'), 3000);
                } catch (err) {
                    setEmailStatus('error');
                    setTimeout(() => setEmailStatus('idle'), 3000);
                    const mailto = `mailto:${targetEmail}?subject=${encodeURIComponent(topic || 'Meeting Summary')}&body=${encodeURIComponent(JSON.stringify(analysis, null, 2))}`;
                    window.location.href = mailto;
                }
            };

            const handleClearTranscript = () => {
                fullTextRef.current = '';
                setTranscript(''); 
                setInterim('');
                localStorage.removeItem('minutes_live_transcript');
            };

            const resetApp = () => {
                localStorage.clear();
                window.location.href = window.location.pathname + "?t=" + Date.now();
            };

            // VIEWS
            if (view === 'config') return (
                <div className="max-w-md mx-auto p-6 min-h-screen bg-white fade-in">
                    <h2 className="text-2xl font-black mb-1 uppercase tracking-tighter text-slate-800">Setup Persona</h2>
                    <p className="text-xs text-slate-400 font-bold mb-8 uppercase tracking-widest">Minutes AI Pro Build <span className="ml-2 text-indigo-500">v2.15</span></p>
                    
                    <div className="space-y-6">
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <div className="flex justify-between items-end mb-3">
                                    <label className="text-[10px] font-black uppercase text-slate-400 block leading-none">From</label>
                                    <button onClick={() => setSenderEmail('')} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Clear</button>
                                </div>
                                <input type="email" value={senderEmail} onChange={e => setSenderEmail(e.target.value)} placeholder="Your email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:border-indigo-500 outline-none" />
                            </div>
                            <div>
                                <div className="flex justify-between items-end mb-3">
                                    <label className="text-[10px] font-black uppercase text-slate-400 block leading-none">To</label>
                                    <div className="flex gap-2">
                                        <button onClick={() => setTargetEmail(senderEmail)} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Same</button>
                                        <button onClick={() => setTargetEmail('')} className="text-[8px] font-black uppercase text-indigo-500 leading-none">Clear</button>
                                    </div>
                                </div>
                                <input type="email" value={targetEmail} onChange={e => setTargetEmail(e.target.value)} placeholder="Recipient email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-bold focus:border-indigo-500 outline-none" />
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-3">Select Persona</label>
                            <div className="persona-grid">
                                {Object.entries(PERSONAS).map(([key, val]) => (
                                    <button key={key} onClick={() => setSelectedPersona(key)} className={`p-3 text-left rounded-xl border-2 transition-all ${selectedPersona === key ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 text-slate-400'}`}>
                                        <div className="text-[11px] font-black uppercase tracking-tighter leading-tight">{val.title}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {selectedPersona === 'CUSTOM' && (
                            <div className="space-y-4 fade-in">
                                <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Custom Title</label>
                                <input type="text" value={customTitle} onChange={e => setCustomTitle(e.target.value)} placeholder="e.g. Legal Specialist" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-bold focus:border-indigo-500 outline-none" />
                                <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">AI Instructions</label>
                                <textarea value={customPrompt} onChange={e => setCustomPrompt(e.target.value)} placeholder="What should the AI look for?" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs font-medium h-24 outline-none" />
                            </div>
                        )}

                        <div className="flex flex-col gap-3">
                            <button onClick={saveDefaults} className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-[11px] shadow-xl shadow-indigo-100 active:scale-95 transition-all">Start Session</button>
                            <button onClick={resetApp} className="w-full text-slate-400 font-black py-2 rounded-xl uppercase tracking-widest text-[8px] hover:text-red-500 transition-all">Nuclear Reset & Clear Cache</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'record') return (
                <div className="max-w-md mx-auto p-6 flex flex-col min-h-screen fade-in">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('config')} className="text-slate-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
                        <div className="text-center">
                            <h1 className="font-black italic text-lg tracking-tighter leading-none text-slate-800">{(selectedPersona === 'CUSTOM' && customTitle) ? customTitle : PERSONAS[selectedPersona].title}</h1>
                            <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Live Mode</p>
                        </div>
                        <div className="w-6"></div>
                    </header>

                    {error && (
                        <div className="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-[11px] font-bold text-red-600 leading-tight fade-in">
                            {error}
                        </div>
                    )}

                    <div className="flex-1 flex flex-col space-y-4">
                        <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                            {isRecording && <div className="absolute inset-0 bg-indigo-500 opacity-[0.02] animate-pulse"></div>}
                            <div className="flex justify-center items-end gap-1 mb-8 h-8 relative z-10">
                                {vols.map((v, i) => <div key={i} className="w-2 bg-indigo-500 rounded-full transition-all duration-75" style={{height: `${v}%`, opacity: 0.3}} />)}
                            </div>
                            <button onClick={toggleRecording} className={`w-32 h-32 rounded-full mx-auto flex items-center justify-center transition-all relative z-10 ${isRecording ? 'bg-indigo-600 shadow-2xl shadow-indigo-200 scale-105' : 'bg-slate-100'}`}>
                                {isRecording ? <div className="w-8 h-8 bg-white rounded-lg" /> : <div className="w-8 h-8 bg-slate-300 rounded-full" />}
                            </button>
                            <input value={topic} onChange={e => {setTopic(e.target.value); localStorage.setItem('minutes_live_topic', e.target.value)}} placeholder="Topic..." className="mt-8 w-full text-center font-black uppercase text-sm border-b border-slate-100 pb-2 focus:border-indigo-500 outline-none relative z-10" />
                        </div>

                        <div className="flex-1 bg-white rounded-[2rem] border border-slate-100 p-6 shadow-sm overflow-hidden flex flex-col">
                            <div className="flex justify-between items-center mb-3">
                                <span className="text-[9px] font-black text-slate-300 uppercase">Transcript</span>
                                <button onClick={handleClearTranscript} className="text-[9px] font-black text-slate-300 uppercase">Clear</button>
                            </div>
                            <div className="flex-1 overflow-y-auto text-sm font-semibold text-slate-600 leading-relaxed custom-scroll">
                                {transcript} <span className="text-indigo-400">{interim}</span>
                            </div>
                        </div>

                        <button onClick={runAnalysis} disabled={isLoading || !transcript} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-[11px] disabled:opacity-20 transition-all">
                            {isLoading ? "Consulting AI..." : "Generate AI Insights"}
                        </button>
                    </div>
                </div>
            );

            if (view === 'analysis' && analysis) return (
                <div className="max-w-md mx-auto p-6 space-y-4 pb-20 fade-in">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('record')} className="text-slate-400 font-black text-[10px] uppercase">Back</button>
                        <h2 className="font-black uppercase text-indigo-600 text-sm italic tracking-tighter">Minutes AI Report</h2>
                        <button 
                            onClick={sendDirectEmail} 
                            disabled={emailStatus === 'sending'}
                            className={`font-black text-[10px] uppercase ${emailStatus === 'sent' ? 'text-emerald-500' : 'text-indigo-600'}`}
                        >
                            {emailStatus === 'sending' ? 'Sending...' : emailStatus === 'sent' ? 'Sent!' : 'Send Email'}
                        </button>
                    </header>

                    <div className="bg-indigo-600 text-white rounded-[2rem] p-8 shadow-xl">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-indigo-200 mb-6 border-b border-white/10 pb-2">{(selectedPersona === 'CUSTOM' && customTitle) ? customTitle : PERSONAS[selectedPersona].title} Insights</h3>
                        <div className="space-y-6">
                            {Object.entries(analysis.insights || {}).map(([key, val]) => (
                                <div key={key}>
                                    <div className="text-[9px] font-black uppercase text-indigo-300 mb-1">{key.replace(/_/g, ' ')}</div>
                                    <div className="text-sm font-bold italic">"{val}"</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 px-2 mt-8">Chapters & Discussion</h3>
                        {(analysis.chapters || []).map((chapter, i) => (
                            <div key={i} className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm">
                                <span className="chapter-pill bg-slate-100 text-slate-500">Chapter {i+1}</span>
                                <h4 className="text-sm font-black uppercase text-slate-800 mb-3">{chapter.title}</h4>
                                <ul className="space-y-2">
                                    {(chapter.bullets || []).map((b, bi) => (
                                        <li key={bi} className="text-xs font-semibold text-slate-600 flex gap-2">
                                            <span className="text-indigo-400 mt-1">•</span>
                                            {b}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => { setView('config'); setAnalysis(null); handleClearTranscript(); setTopic(''); setError(null); }} className="w-full py-10 text-[10px] font-black uppercase text-slate-400 tracking-widest">New Meeting</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
